name: Weekly Generate JSON + Base58

on:
  schedule:
    - cron: '0 4 * * 1'          # 每周一 04:00 UTC（北京时间 12:00）
  workflow_dispatch:             # 支持手动触发测试

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm install

      - name: Generate files
        run: npm run generate

      - name: Commit & Push
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add ouotv/ouonnki-tv-sources-*.json ouotv/ouonnki-tv-sources-*.txt
          git commit -m "Weekly update: $(date +'%Y-%m-%d')" || echo "No new files"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
