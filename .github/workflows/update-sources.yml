name: Update KVideo Sources from hafrey1

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0 点自动运行（北京时间早上 8 点）
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 关键修复：授予写权限，让 git push 成功

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download and generate sources
        run: |
          python - <<'PY'
          import json
          import urllib.request
          from urllib.error import URLError

          # 稳定 raw URL
          url = "https://raw.githubusercontent.com/hafrey1/LunaTV-config/main/jingjian.json"

          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  data = json.loads(response.read().decode('utf-8'))
          except URLError as e:
              print(f"下载失败: {e}")
              exit(1)

          api_site = data.get("api_site", {})

          if not api_site:
              print("api_site 为空！")
              exit(1)

          normal_base = None
          adult_base = None

          # 成人关键词（已覆盖当前所有敏感源）
          adult_keywords = [
              "麻豆", "91", "AIvin", "155", "玉兔", "番号", "老色", "黄色",
              "大奶", "奶香", "森林", "辣椒", "鲨鱼", "幸", "黑料", "桃花",
              "精品", "souav", "老色逼", "大奶子"
          ]

          # 优先取卧龙资源（稳定普通源）
          if "wolongzyw.com" in api_site:
              normal_base = api_site["wolongzyw.com"].get("api")

          # 如果没有卧龙，取第一个非成人源
          if not normal_base:
              for item in api_site.values():
                  name_lower = item.get("name", "").lower()
                  api_url = item.get("api")
                  if api_url and not any(kw.lower() in name_lower for kw in adult_keywords):
                      normal_base = api_url
                      break

          # 取第一个成人源
          for item in api_site.values():
              name_lower = item.get("name", "").lower()
              api_url = item.get("api")
              if api_url and any(kw.lower() in name_lower for kw in adult_keywords):
                  adult_base = api_url
                  break

          # 生成 普通资源.json
          normal_sources = []
          if normal_base:
              normal_sources.append({
                  "id": "my_source_1",
                  "name": "我的精选源",
                  "baseUrl": normal_base,
                  "group": "normal",
                  "priority": 1
              })

          normal_path = "普通资源.json"
          with open(normal_path, 'w', encoding='utf-8') as f:
              json.dump(normal_sources, f, indent=2, ensure_ascii=False)

          # 生成 隐藏资源.json
          adult_sources = []
          if adult_base:
              adult_sources.append({
                  "id": "extra_source_1",
                  "name": "备用线路",  # 不明显名称，可改为“VIP通道”、“高级合集”等
                  "baseUrl": adult_base,
                  "group": "adult",
                  "enabled": True
              })

          adult_path = "隐藏资源.json"
          with open(adult_path, 'w', encoding='utf-8') as f:
              json.dump(adult_sources, f, indent=2, ensure_ascii=False)

          print("生成成功！")
          print(f"普通源: {normal_base}")
          print(f"成人源: {adult_base}")
          PY

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add 普通资源.json 隐藏资源.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update: generate 普通资源.json and 隐藏资源.json from hafrey1" && git push)
