name: Update KVideo All Sources from hafrey1

on:
  schedule:
    - cron_expression = '0 0 0 * * 2'  # 每周二凌晨 0 点运行
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 允许 git push

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download and generate all sources
        run: |
          python - <<'PY'
          import json
          import urllib.request
          from urllib.error import URLError

          url = "https://raw.githubusercontent.com/hafrey1/LunaTV-config/main/jingjian.json"

          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  data = json.loads(response.read().decode('utf-8'))
          except URLError as e:
              print(f"下载失败: {e}")
              exit(1)

          api_site = data.get("api_site", {})

          if not api_site:
              print("api_site 为空！")
              exit(1)

          normal_sources = []
          adult_sources = []  # 现在叫 vip 来源，但逻辑仍是成人源

          # 成人关键词（覆盖所有敏感源）
          adult_keywords = [
              "🔞", "麻豆", "91", "AIvin", "155", "玉兔", "番号", "老色", "黄色",
              "大奶", "奶香", "森林", "辣椒", "鲨鱼", "幸", "黑料", "桃花",
              "精品", "souav", "老色逼", "大奶子", "jkun", "乐播", "百万"
          ]

          normal_count = 1
          vip_count = 1

          for item in api_site.values():
              api_url = item.get("api")
              orig_name = item.get("name", "未知源")
              name_lower = orig_name.lower()

              if not api_url:
                  continue

              is_adult = any(kw.lower() in name_lower for kw in adult_keywords)

              if is_adult:
                  adult_sources.append({
                      "id": f"extra_source_{vip_count}",
                      "name": f"备用线路{vip_count}",  # 可改为“VIP线路{vip_count}”、“私人通道{vip_count}”等
                      "baseUrl": api_url,
                      "group": "vip",               # 关键修改：不明显标识
                      "enabled": True
                  })
                  vip_count += 1
              else:
                  display_name = orig_name.strip() or "精选源"
                  normal_sources.append({
                      "id": f"normal_source_{normal_count}",
                      "name": display_name,
                      "baseUrl": api_url,
                      "group": "normal",
                      "priority": 1
                  })
                  normal_count += 1

          # 写入 普通资源.json
          normal_path = "普通资源.json"
          with open(normal_path, 'w', encoding='utf-8') as f:
              json.dump(normal_sources, f, indent=2, ensure_ascii=False)

          # 写入 隐藏资源.json（文件名仍叫隐藏资源，但内容已低调）
          adult_path = "隐藏资源.json"
          with open(adult_path, 'w', encoding='utf-8') as f:
              json.dump(adult_sources, f, indent=2, ensure_ascii=False)

          print("生成成功！")
          print(f"普通源数量: {len(normal_sources)}")
          print(f"VIP（原成人）源数量: {len(adult_sources)}")
          PY

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add 普通资源.json 隐藏资源.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update: all sources, adult group changed to 'vip' for obfuscation" && git push)
