name: Update KVideo Sources from hafrey1

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0 点自动运行（北京时间早上 8 点）
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download and generate sources
        run: |
          python - <<'PY'
          import json
          import requests

          # 来源 URL
          url = "https://raw.githubusercontent.com/hafrey1/LunaTV-config/refs/heads/main/jingjian.json"

          # 下载原始 JSON
          response = requests.get(url)
          response.raise_for_status()
          data = response.json()

          api_site = data.get("api_site", {})

          normal_base = None
          adult_base = None

          # 成人关键词（已覆盖当前文件所有成人源）
          adult_keywords = [
              "91", "麻豆", "AIvin", "155", "玉兔", "番号", "老色", "黄色",
              "大奶", "奶香", "森林", "辣椒", "鲨鱼", "幸", "黑料", "桃花",
              "精品", "souav", "AV", "成人", "🔞", "jin18", "老色逼", "大奶子"
          ]

          # 可选：优先选择稳定的普通源（这里优先卧龙，如果没有再取第一个）
          priority_normal = ["wolongzyw.com", "cj.lzcaiji.com", "ikunzy.com"]  # 可自定义顺序

          for priority_key in priority_normal:
              if priority_key in api_site:
                  normal_base = api_site[priority_key].get("api")
                  break

          if not normal_base:
              for key, item in api_site.items():
                  name_lower = item.get("name", "").lower()
                  api_url = item.get("api")
                  if api_url and not any(kw.lower() in name_lower for kw in adult_keywords):
                      normal_base = api_url
                      break

          # 成人源取第一个匹配的（可调整为特定优先）
          for key, item in api_site.items():
              name_lower = item.get("name", "").lower()
              api_url = item.get("api")
              if api_url and any(kw.lower() in name_lower for kw in adult_keywords):
                  adult_base = api_url
                  break

          # 生成 普通资源.json（只含普通源）
          normal_sources = []
          if normal_base:
              normal_sources.append({
                  "id": "my_source_1",
                  "name": "我的精选源",
                  "baseUrl": normal_base,
                  "group": "normal",
                  "priority": 1
              })

          normal_path = "普通资源.json"
          with open(normal_path, 'w', encoding='utf-8') as f:
              json.dump(normal_sources, f, indent=2, ensure_ascii=False)

          # 生成 隐藏资源.json（只含成人源，不明显标识）
          adult_sources = []
          if adult_base:
              adult_sources.append({
                  "id": "extra_source_1",
                  "name": "备用线路",          # 不明显的名称（可改为“高级合集”、“私人源”等）
                  "baseUrl": adult_base,
                  "group": "adult",
                  "enabled": True
              })

          adult_path = "隐藏资源.json"
          with open(adult_path, 'w', encoding='utf-8') as f:
              json.dump(adult_sources, f, indent=2, ensure_ascii=False)

          print("生成完成：")
          print(f"{normal_path} - 普通源: {normal_base}")
          print(f"{adult_path} - 成人源: {adult_base}")
          PY

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add 普通资源.json 隐藏资源.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update: generate 普通资源.json and 隐藏资源.json from hafrey1" && git push)
